<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Spark</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2.5">
</head>
<body>

{% for s in sessions %}
<div class="terminal-wrap" id="wrap-{{ s.id }}" style="{% if s.id != session.id %}display:none;{% endif %}">
<iframe id="term-{{ s.id }}" class="terminal-frame" data-local="{{ s.local_url }}" data-remote="{{ s.remote_url }}" style="pointer-events:none;"></iframe>
</div>
{% endfor %}

<div id="controls">
    <!-- Hamburger menu -->
    <div id="hamburger-panel" style="display:none; flex-wrap:wrap; gap:0.2rem; padding:0.2rem 0.4rem; justify-content:center;">
        <!-- Claude Code commands -->
        <button class="btn key-btn ham-yes" onclick="sendCommand('yes')" style="height:28px;font-size:0.6rem;font-weight:600;">Yes</button>
        <button class="btn key-btn ham-no" onclick="sendCommand('no')" style="height:28px;font-size:0.6rem;font-weight:600;">No</button>
        <button class="btn key-btn" onclick="sendCommand('/new')" style="height:28px;font-size:0.6rem;font-weight:600;">/new</button>
        <button class="btn key-btn" onclick="sendCommand('/compact')" style="height:28px;font-size:0.6rem;font-weight:600;">/compact</button>
        <!-- Navigation -->
        <button class="btn key-btn" onclick="sendKey('Tab')" style="height:28px;font-size:0.6rem;">Tab</button>
        <button class="btn key-btn" onclick="sendKey('BTab')" style="height:28px;font-size:0.6rem;">⇧Tab</button>
        <button class="btn key-btn" onclick="sendKey('Up')" style="height:28px;font-size:0.6rem;">▲</button>
        <button class="btn key-btn" onclick="sendKey('Down')" style="height:28px;font-size:0.6rem;">▼</button>
        <!-- Control -->
        <button class="btn key-btn" onclick="sendKey('C-c')" style="height:28px;font-size:0.6rem;">^C</button>
        <button class="btn key-btn" onclick="sendKey('C-z')" style="height:28px;font-size:0.6rem;">^Z</button>
        <!-- Numbered selections -->
        <button class="btn key-btn" onclick="sendCommand('1')" style="height:28px;font-size:0.6rem;">1</button>
        <button class="btn key-btn" onclick="sendCommand('2')" style="height:28px;font-size:0.6rem;">2</button>
        <button class="btn key-btn" onclick="sendCommand('3')" style="height:28px;font-size:0.6rem;">3</button>
        <!-- Screen capture + notify -->
        <button class="btn key-btn" onclick="saveScreenshot()" style="height:28px;font-size:0.6rem;">📷 Save</button>
        <button class="btn key-btn" onclick="copyScreen()" style="height:28px;font-size:0.6rem;">📋 Copy</button>
        <button class="btn key-btn" onclick="textMe()" style="height:28px;font-size:0.6rem;">📲 Text</button>
        <button class="btn key-btn" onclick="playMe()" style="height:28px;font-size:0.6rem;">🔊 Play</button>
    </div>

    <!-- Row 1: Hamburger | PgUp | PgDn | Tabs -->
    <div style="display:flex; align-items:center; margin-top:0.3rem; padding:0 0.2rem;">
        <div style="width:30%; display:flex; gap:0.3rem; align-items:center; flex-shrink:0;">
            <button class="btn key-btn" onclick="toggleHamburger()" style="font-size:0.7rem; flex:1; height:32px; padding:0;">☰</button>
            <button class="btn key-btn" onclick="scrollTerminal('up')" style="font-size:0.5rem;flex:1;height:32px;padding:0;">PgUp</button>
            <button class="btn key-btn" onclick="scrollTerminal('down')" style="font-size:0.5rem;flex:1;height:32px;padding:0;">PgDn</button>
        </div>
        <div id="tab-bar" style="width:70%; display:flex; gap:0.3rem; padding-left:0.3rem; overflow:hidden;">
        </div>
    </div>

    <!-- Type bar -->
    <div style="display:flex; gap:0.3rem; padding:0.2rem 0.2rem 0;">
        <input id="type-bar" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            placeholder="Type here..."
            style="flex:1; height:36px; border:1px solid var(--border-strong); border-radius:6px; padding:0 8px; font-size:0.85rem; font-family:var(--font-mono); background:var(--surface); color:var(--text);">
        <button class="btn key-btn" onclick="sendTyped()" style="height:36px; font-size:0.7rem; padding:0 10px; font-weight:600;">SEND</button>
    </div>

    <!-- Row 2: ESC | MIC | ENTER -->
    <div class="key-row" style="gap:0.5rem;">
        <button class="btn big-btn btn-esc" onclick="sendKey('Escape')" style="flex:1;height:50px;">ESC</button>
        <button id="mic-btn" class="btn big-btn btn-mic" onclick="toggleMic()">MIC</button>
        <button class="btn big-btn btn-enter" onclick="sendKey('Enter')" style="flex:1;height:50px;">ENTER</button>
    </div>
    <div style="height:60px;"></div>
</div>

<script>
// --- Terminal iframe URLs ---
(function() {
    const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
    document.querySelectorAll('.terminal-frame').forEach(f => {
        f.src = isLocal ? f.dataset.local : f.dataset.remote;
    });
})();

// --- Prevent iframe from stealing keyboard focus ---
// All input goes through Spark UI (mic, type-bar, buttons), never directly into terminal.
// Without this, clicking the terminal iframe steals focus and hotkeys stop working.
document.addEventListener('focusin', (e) => {
    if (e.target.tagName === 'IFRAME') {
        e.target.blur();
        document.body.focus();
    }
});

// --- State ---
let listening = false;
let audioStream = null;
let recorder = null;
let chunks = [];
let _sessions = [];
let ACTIVE_SESSION = '{{ session.id }}';

function setStatus(text) {
    let toast = document.getElementById('spark-toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'spark-toast';
        toast.style.cssText = 'position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 18px;border-radius:8px;font-size:0.85rem;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90vw;text-align:center;';
        document.body.appendChild(toast);
    }
    toast.textContent = text;
    toast.style.opacity = '1';
    clearTimeout(toast._tid);
    toast._tid = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

function sparkLog(msg) {
    fetch('/api/log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg})}).catch(()=>{});
}

// --- Push-to-talk ---
async function toggleMic() {
    const btn = document.getElementById('mic-btn');
    if (listening) {
        // Stop recording → transcribe → send
        listening = false;
        btn.classList.remove('recording');
        btn.textContent = 'MIC';
        setStatus('Transcribing...');

        if (recorder && recorder.state === 'recording') {
            const blob = await new Promise(resolve => {
                recorder.onstop = () => resolve(new Blob(chunks, {type: recorder.mimeType}));
                recorder.stop();
            });

            const ext = blob.type.includes('webm') ? 'webm' : 'm4a';
            const formData = new FormData();
            formData.append('audio', blob, `recording.${ext}`);

            try {
                const res = await fetch('/api/transcribe', {method: 'POST', body: formData});
                const data = await res.json();
                if (data.text && data.text.trim()) {
                    const text = data.text.trim();
                    // Paste directly into terminal (no enter) — user sends when ready
                    fetch('/api/paste-text', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, session: ACTIVE_SESSION})});
                    setStatus('Pasted — mic again or hit ENTER');
                    sparkLog('TRANSCRIBED: ' + text);
                } else {
                    setStatus('No speech detected');
                }
            } catch(e) {
                setStatus('Transcribe failed');
                sparkLog('TRANSCRIBE_ERR: ' + e.message);
            }
        }

        if (audioStream) {
            audioStream.getTracks().forEach(t => t.stop());
            audioStream = null;
        }
        recorder = null;
        chunks = [];
    } else {
        // Start recording
        try {
            audioStream = await navigator.mediaDevices.getUserMedia({audio: true});
            chunks = [];
            const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
            recorder = new MediaRecorder(audioStream, {mimeType});
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.start();
            listening = true;
            btn.classList.add('recording');
            btn.textContent = 'REC';
            setStatus('Recording...');
            sparkLog('MIC_ON');
        } catch(e) {
            setStatus('Mic access denied');
            sparkLog('MIC_DENIED: ' + e.message);
        }
    }
}

// --- Type bar ---
function sendTyped() {
    const input = document.getElementById('type-bar');
    const text = input.value.trim();
    if (!text) return;
    sendCommand(text);
    input.value = '';
    setStatus('Sent: ' + text);
}
document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('type-bar');
    if (input) {
        input.addEventListener('keydown', (e) => {
            // Ctrl+M toggles mic (even while typing) — must check before Enter
            // because Ctrl+M = ASCII 13 = carriage return in some browsers
            if (e.ctrlKey && e.code === 'KeyM') { e.preventDefault(); toggleMic(); return; }
            if (e.key === 'Enter' && !e.ctrlKey) { e.preventDefault(); sendTyped(); }
            e.stopPropagation(); // don't let keyboard router intercept typing
        });
    }
});

// --- Hotkey: toggle mic ---
// Works with: Ctrl+M (desktop), F9 (AHK remap), double-tap Enter/PageDown (clicker)
// NOTE: Volume keys (AudioVolumeUp) do NOT reach JS on Android — OS intercepts them.
let _lastMicKey = 0;
const MIC_DOUBLE_TAP_MS = 400;

document.addEventListener('keydown', (e) => {
    // Skip if typing in the type-bar
    if (e.target.id === 'type-bar') return;

    // Ctrl+M — desktop keyboard (use e.code because Ctrl+M = ASCII 13 = Enter in some browsers)
    if (e.ctrlKey && e.code === 'KeyM') {
        e.preventDefault();
        toggleMic();
        return;
    }

    // F9 — AutoHotkey remap target
    if (e.key === 'F9') {
        e.preventDefault();
        toggleMic();
        return;
    }

    // Double-tap detection for clicker keys (PageDown, PageUp)
    // Single tap still works normally — only double-tap triggers mic
    if (e.key === 'PageDown' || e.key === 'PageUp') {
        const now = Date.now();
        if (now - _lastMicKey < MIC_DOUBLE_TAP_MS) {
            e.preventDefault();
            toggleMic();
            _lastMicKey = 0;
        } else {
            _lastMicKey = now;
        }
        return;
    }

    // Forward common keys to tmux (since iframe is cross-origin)
    if (e.key === 'Enter' && !e.ctrlKey) { e.preventDefault(); sendKey('Enter'); return; }
    if (e.key === 'Escape') { e.preventDefault(); sendKey('Escape'); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); sendKey('Up'); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); sendKey('Down'); return; }
    if (e.key === 'Tab') { e.preventDefault(); sendKey('Tab'); return; }
    if (e.key === 'Backspace') { e.preventDefault(); sendKey('BSpace'); return; }
});

// --- Key/nav helpers ---
async function sendKey(key) {
    try {
        const res = await fetch('/api/key', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({key, session: ACTIVE_SESSION}),
        });
        if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            setStatus('Key failed: ' + (d.error || res.status));
        }
    } catch(e) {
        setStatus('Key failed — retrying...');
        try {
            await fetch('/api/key', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key, session: ACTIVE_SESSION})});
        } catch(e2) {
            setStatus('Key failed — check connection');
        }
    }
}

function scrollTerminal(direction) {
    fetch('/api/scroll', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({direction, session: ACTIVE_SESSION})});
}

function sendCommand(text) {
    fetch('/api/voice-text', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, session: ACTIVE_SESSION})});
}

function saveScreenshot() {
    setStatus('Saving...');
    fetch('/api/screenshot/save', {method:'POST'})
        .then(r => r.json().then(d => {
            if (r.ok) setStatus('Screenshot saved');
            else setStatus('Save failed: ' + (d.error || 'empty screen'));
        }))
        .catch(() => setStatus('Save failed: server error'));
}

function textMe() {
    setStatus('Sending text...');
    fetch('/api/text-me', {method:'POST'})
        .then(r => r.json().then(d => {
            if (r.ok) setStatus('Text queued — SMS on its way');
            else setStatus('Text failed: ' + (d.error || 'unknown'));
        }))
        .catch(() => setStatus('Text failed: server error'));
}

function playMe() {
    setStatus('Playing...');
    fetch('/api/play-me', {method:'POST'})
        .then(r => r.json().then(d => {
            if (r.ok) setStatus('Play queued — audio on its way');
            else setStatus('Play failed: ' + (d.error || 'unknown'));
        }))
        .catch(() => setStatus('Play failed: server error'));
}

function copyScreen() {
    setStatus('Copying...');
    fetch('/api/screenshot', {method:'POST'})
        .then(r => r.json())
        .then(d => {
            if (!d.text) { setStatus('Nothing to copy'); return; }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(d.text)
                    .then(() => setStatus('Copied to clipboard'))
                    .catch(() => fallbackCopy(d.text));
            } else {
                fallbackCopy(d.text);
            }
        })
        .catch(() => setStatus('Copy failed: server error'));
}

function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); setStatus('Copied to clipboard'); }
    catch(e) { setStatus('Copy failed — try from localhost'); }
    document.body.removeChild(ta);
}

function toggleHamburger() {
    const panel = document.getElementById('hamburger-panel');
    panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}

// --- Session themes ---
function applyTheme(id) {
    document.body.className = document.body.className.replace(/theme-\w+/g, '').trim();
    document.body.classList.add('theme-' + id);
}

// --- Session/tab management ---
let _switching = false;
async function switchSession(id) {
    if (_switching || id === ACTIVE_SESSION) return;
    _switching = true;
    try {
        const res = await fetch('/api/session', {
            method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id}),
        });
        if (!res.ok) {
            setStatus('Switch failed');
            return;
        }
        // Only update after backend confirms
        ACTIVE_SESSION = id;
        document.querySelectorAll('.terminal-wrap').forEach(w => {
            w.style.display = w.id === 'wrap-' + id ? '' : 'none';
        });
        applyTheme(id);
        renderTabs();
    } catch(e) {
        setStatus('Switch failed — check connection');
    } finally {
        _switching = false;
    }
}

function createTabButton(s) {
    const btn = document.createElement('button');
    btn.className = 'btn tab-btn';
    if (s.id === ACTIVE_SESSION) btn.classList.add('active');
    const nameDiv = document.createElement('div');
    nameDiv.innerText = s.name || s.id;
    btn.appendChild(nameDiv);
    if (!s.alive && s.id !== ACTIVE_SESSION) btn.style.opacity = '0.5';
    btn.onclick = () => switchSession(s.id);
    btn.oncontextmenu = (e) => {
        e.preventDefault();
        const name = prompt('Rename tab:', s.name);
        if (name && name.trim()) renameSession(s.id, name.trim());
    };
    return btn;
}

async function renameSession(id, name) {
    if (!name) return;
    try {
        await fetch('/api/session/rename', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id,name})});
        refreshSessions();
    } catch(e) {}
}

function renderTabs() {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    _sessions.forEach(s => bar.appendChild(createTabButton(s)));
}

async function refreshSessions() {
    try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        _sessions = data.sessions;
        renderTabs();
    } catch(e) {}
}

// --- Auto-reconnect terminal iframes ---
// When page becomes visible again (phone unlocked, tab switched back),
// reload all terminal iframes so you never see "hit enter to reconnect"
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        document.querySelectorAll('.terminal-frame').forEach(f => {
            try { f.src = f.src; } catch(e) {}
        });
    }
});

// --- Cleanup ---
window.addEventListener('beforeunload', () => {
    if (audioStream) audioStream.getTracks().forEach(t => t.stop());
    if (recorder && recorder.state === 'recording') try { recorder.stop(); } catch(e) {}
});

window.addEventListener('load', () => { applyTheme(ACTIVE_SESSION); refreshSessions(); });
setInterval(refreshSessions, 10000);
</script>
</body>
</html>
