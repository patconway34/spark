<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spark — Event Log</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.1">
<style>
#log {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    padding-bottom: calc(1rem + env(safe-area-inset-bottom, 80px));
    line-height: 1.8;
    -webkit-overflow-scrolling: touch;
    font-family: var(--font-mono);
    font-size: 0.8rem;
}
.ev { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 0.2rem 0; }
.ev-done, .ev-idle { color: var(--success); }
.ev-question { color: var(--danger); font-weight: 600; }
.ev-working { color: var(--accent); }
.ev-ts { color: var(--text-muted); margin-right: 0.5rem; }
.ev-name { color: var(--text-dim); font-weight: 500; margin-right: 0.5rem; }
.ev-snip { color: var(--text-muted); font-size: 0.75rem; font-style: italic; }

#header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
#header h1 { font-size: 0.9rem; font-weight: 600; color: var(--text-dim); }
.back-btn {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 0.4rem 0.8rem;
    border: 1px solid var(--accent-dim);
    border-radius: 8px;
    background: var(--accent-dim);
}
</style>
</head>
<body>

<div id="header">
    <h1>EVENT LOG</h1>
    <a href="/chat" class="back-btn">Back to Terminal</a>
</div>

<div id="log"></div>

<script>
const log = document.getElementById('log');
const MAX = 500;

function add(name, status, snippet, savedTs) {
    const d = document.createElement('div');
    d.className = 'ev ev-' + status;
    // Format timestamp from HH:MM:SS to HH:MM
    const ts = savedTs ? savedTs.split(' ')[1] || savedTs : new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit'});
    
    d.innerHTML = '<span class="ev-ts">' + ts + '</span> '
        + '<span class="ev-name">' + esc(name) + '</span> '
        + '<span class="ev-status">' + status + '</span>'
        + (snippet ? ' <span class="ev-snip">\u2014 ' + esc(snippet) + '</span>' : '');
    log.appendChild(d);
    while (log.children.length > MAX) log.removeChild(log.firstChild);
    log.scrollTop = log.scrollHeight;
}

function esc(s) { const d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

fetch('/api/event-log')
    .then(r => r.json())
    .then(data => {
        (data.events || []).forEach(ev => add(ev.name || ev.id, ev.status, ev.snippet || '', ev.ts));
        startLive();
    })
    .catch(() => startLive());

function startLive() {
    const es = new EventSource('/api/events');
    es.addEventListener('session-status', (e) => {
        try {
            const d = JSON.parse(e.data);
            add(d.name || d.id, d.status, d.snippet || '');
        } catch (err) {}
    });
}
</script>
</body>
</html>
