<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Spark</title>
    <style>
        :root {
            --flame: #3b82f6;
            --flame-dim: #3b82f620;
            --flame-mid: #3b82f640;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: contain;
        }
        #terminal {
            flex: 1;
            border: none;
            border-top: 2px solid var(--flame-mid);
            width: 100%;
        }
        #status-bar {
            padding: 0.3rem 0.75rem;
            background: #111122;
            border-top: 1px solid var(--flame-mid);
            font-size: 0.75rem;
            color: #888;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            max-height: 3rem;
            overflow-y: auto;
        }
        #controls {
            background: #111122;
            border-top: 1px solid #2a2a4e;
            padding: 0.3rem 0.4rem;
            padding-bottom: calc(0.3rem + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .key-row {
            display: flex;
            gap: 0.25rem;
            justify-content: center;
        }
        .key-btn {
            height: 38px;
            flex: 1;
            max-width: 80px;
            border: 1px solid #3a3a5e;
            border-radius: 6px;
            background: #2a2a4e;
            color: #ccc;
            font-size: 0.7rem;
            font-family: monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .key-btn:active {
            background: #5a5a8e;
        }
        .bar-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        #mic-btn {
            background: #7b6ba8;
            color: #fff;
            transition: background 0.2s;
        }
        #mic-btn.listening {
            background: #2ecc71;
        }
        #mic-btn.recording {
            background: #e04040;
            animation: pulse 1s infinite;
        }
        #stop-btn {
            background: #e04040;
            color: #fff;
            display: none;
        }
        #speak-toggle {
            background: #2a2a4e;
            font-size: 1.1rem;
        }
        #stt-toggle {
            background: #2a2a4e;
            color: #ccc;
            font-size: 0.6rem;
            font-weight: bold;
            width: 40px;
            height: 40px;
        }
        #auto-btn {
            background: #2a2a4e;
            color: #888;
            font-size: 0.6rem;
            font-weight: bold;
            width: 40px;
            height: 40px;
            transition: background 0.2s;
        }
        #auto-btn.active {
            background: #2ecc71;
            color: #fff;
        }
        .tab-btn {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #3a3a5e;
            border-radius: 16px;
            background: #2a2a4e;
            color: #999;
            font-size: 0.7rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }
        .tab-btn.active {
            background: var(--flame);
            color: #fff;
            border-color: var(--flame);
            font-weight: 600;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

<iframe id="terminal" src="{{ session.terminal_url or 'https://terminal.tradingdata.net' }}"></iframe>

<div id="status-bar">Tap mic to start listening</div>

<div id="controls">
    <div class="key-row">
        <button class="key-btn" onclick="sendSlashNew()" style="font-size:0.7rem;font-weight:600;letter-spacing:-0.5px;">/new</button>
        <button class="key-btn" onclick="sendKey('BTab')">⇧Tab</button>
        <button class="key-btn" onclick="sendKey('Tab')">Tab</button>
        <button class="key-btn" onclick="sendKey('Escape')">Esc</button>
        <button class="key-btn" onclick="sendKey('Enter')">Enter</button>
    </div>
    <div class="key-row">
        <button class="key-btn" onclick="sendKey('Up')">&#9650;</button>
        <button class="key-btn" onclick="sendKey('Down')">&#9660;</button>
        <button class="key-btn" onclick="scrollTerminal('up')" style="font-size:0.55rem;">PgUp</button>
        <button class="key-btn" onclick="scrollTerminal('down')" style="font-size:0.55rem;">PgDn</button>
    </div>
    <div class="key-row" style="justify-content: center; gap: 0.5rem;">
        <button id="stop-btn" class="bar-btn" onclick="stopSpeaking()" style="width:34px;height:34px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
            </svg>
        </button>
        <button id="mic-btn" class="bar-btn" onclick="toggleListening()" style="width:34px;height:34px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
        <button id="speak-toggle" class="bar-btn" onclick="toggleSpeak()" style="width:34px;height:34px;font-size:0.9rem;">
            <span id="speak-icon">🔇</span>
        </button>
        <button id="blink-btn" class="bar-btn" onclick="toggleBlink()" style="width:34px;height:34px;" title="Blink">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </button>
    </div>
    <div class="key-row" style="justify-content: center; gap: 0.3rem; flex-wrap: wrap;">
        <button class="tab-btn" onclick="switchSession('dev')" id="tab-dev">1</button>
        <button class="tab-btn" onclick="switchSession('nimbus')" id="tab-nimbus">2</button>
        <button class="tab-btn" onclick="switchSession('alpha')" id="tab-alpha">3</button>
        <button class="tab-btn" onclick="switchSession('bravo')" id="tab-bravo">4</button>
        <button class="tab-btn" onclick="switchSession('charlie')" id="tab-charlie">5</button>
        <button class="tab-btn" onclick="switchSession('delta')" id="tab-delta">6</button>
    </div>
    <div style="height: 100px;"></div>
</div>

<script>
// --- State ---
// Suppress "leave site" prompts
window.onbeforeunload = null;
window.addEventListener('beforeunload', (e) => { delete e.returnValue; });

// --- Blink toggle ---
let blinkActive = false;
let terminalUrl = document.getElementById('terminal').src;

function toggleBlink() {
    const frame = document.getElementById('terminal');
    const btn = document.getElementById('blink-btn');
    if (blinkActive) {
        frame.src = terminalUrl;
        btn.style.background = '';
        btn.style.color = '';
        blinkActive = false;
    } else {
        terminalUrl = frame.src;
        frame.src = 'https://blink.tradingdata.net';
        btn.style.background = '#2563eb';
        btn.style.color = '#fff';
        blinkActive = true;
    }
}

let listening = false;
let speakEnabled = false;
let lastTranscriptHash = '';
let currentAudio = null;
let isSpeaking = false;

// --- Core ---
let audioStream = null;
let mainRecorder = null;   // full recording for Groq transcription
let mainChunks = [];
let clipRecorder = null;   // short clip recorder for keyword detection
let clipChunks = [];
let prevClipBlob = null;   // previous clip as a finished blob
let keywordScanInterval = null;  // periodic keyword scan timer
let clipInterval = null;
let _sessions = [];  // loaded for session switching
let audioContext = null;
let analyser = null;
let volumeInterval = null;
let processing = false;    // prevent overlapping keyword checks
let wasTalking = false;    // true when volume was above threshold
let clipHadSpeech = false; // true if current clip had any speech above threshold
let silenceTimer = null;   // fires after sustained silence post-speech
let silenceCommas = 0;     // counts seconds of silence (for keyword check)
let tickTimer = null;      // global 1s ticker while mic is quiet
let totalTicks = 0;        // total silent seconds in current quiet stretch
let pendingCommas = 0;     // commas to prepend to next transcript chunk
let transcriptParts = [];  // accumulates text + commas between keyword checks

const VOLUME_THRESHOLD = 10;
const SILENCE_SECONDS = 2;  // seconds of silence before checking clip

function sparkLog(msg) {
    fetch('/api/log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg})}).catch(()=>{});
}

function scrollTerminal(direction) {
    fetch('/api/scroll', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({direction}),
    });
    window.scrollTo(0, 0);
}

async function sendKey(key) {
    try {
        const res = await fetch('/api/key', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({key: key}),
        });
        if (!res.ok) sparkLog('KEY_ERR: ' + res.status);
    } catch (e) {
        sparkLog('KEY_FETCH_ERR: ' + e.message);
        // Retry once after 200ms
        setTimeout(() => {
            fetch('/api/key', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({key: key}),
            }).catch(() => {});
        }, 200);
    }
}

function sendSlashNew() {
    fetch('/api/voice-text', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: '/new'}),
    });
}

function setStatus(text) {
    document.getElementById('status-bar').textContent = text;
}

// --- TTS controls ---
function toggleSpeak() {
    speakEnabled = !speakEnabled;
    document.getElementById('speak-icon').textContent = speakEnabled ? '🔊' : '🔇';
    localStorage.setItem('speakEnabled', speakEnabled);
    if (speakEnabled) pollTranscript();
}

function stopSpeaking() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }
    isSpeaking = false;
    document.getElementById('stop-btn').style.display = 'none';
    setStatus(listening ? 'Recording... say "now" to send' : 'Stopped');
}

// --- Mic toggle ---
async function toggleListening() {
    if (listening) {
        listening = false;
        stopListening();
        document.getElementById('mic-btn').classList.remove('listening', 'recording');
        setStatus('Mic off');
        return;
    }
    await startListening();
}

async function startListening() {
    try {
        audioStream = await navigator.mediaDevices.getUserMedia({audio: true});
        startMainRecorder();
        startVolumeMonitor();
        startKeywordScanner();
        listening = true;
        document.getElementById('mic-btn').classList.add('listening');
        setStatus('Recording... say "now" to send');
        sparkLog('MIC_ON');
    } catch (e) {
        setStatus('Mic access denied');
        sparkLog('MIC_DENIED: ' + e.message);
    }
}

function stopListening() {
    stopVolumeMonitor();
    stopKeywordScanner();
    stopClipCycle();
    if (mainRecorder && mainRecorder.state === 'recording') {
        try { mainRecorder.stop(); } catch(e) {}
    }
    mainRecorder = null;
    mainChunks = [];
    clipChunks = [];
    prevClipBlob = null;
    if (audioStream) {
        audioStream.getTracks().forEach(t => t.stop());
        audioStream = null;
    }
    sparkLog('MIC_OFF');
}

// --- Main recorder (continuous, full audio for transcription) ---
function startMainRecorder() {
    if (!audioStream) return;
    mainChunks = [];
    clipChunks = [];
    prevClipBlob = null;
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mainRecorder = new MediaRecorder(audioStream, {mimeType});
    mainRecorder.ondataavailable = (e) => { if (e.data.size > 0) mainChunks.push(e.data); };
    mainRecorder.start();
    sparkLog('MAIN_REC_START');
}

// --- Clip recorder (separate, for keyword detection) ---
// Starts when voice detected, stops+checks on silence
function stopClipCycle() {
    if (clipRecorder && clipRecorder.state === 'recording') {
        try { clipRecorder.stop(); } catch(e) {}
    }
    clipRecorder = null;
    clipChunks = [];
}

function startNewClip() {
    // Stop old one if still running
    if (clipRecorder && clipRecorder.state === 'recording') {
        try { clipRecorder.stop(); } catch(e) {}
    }
    if (!audioStream) return;
    clipChunks = [];
    clipHadSpeech = false;
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    clipRecorder = new MediaRecorder(audioStream, {mimeType});
    clipRecorder.ondataavailable = (e) => { if (e.data.size > 0) clipChunks.push(e.data); };
    clipRecorder.start();
    sparkLog('CLIP_REC_START');
}

// --- Volume monitoring (UI only — keyword scanning is separate) ---
async function startVolumeMonitor() {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (audioContext.state === 'suspended') await audioContext.resume();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    const source = audioContext.createMediaStreamSource(audioStream);
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    volumeInterval = setInterval(() => {
        if (isSpeaking || processing) return;
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;

        if (avg > VOLUME_THRESHOLD) {
            document.getElementById('mic-btn').classList.add('recording');
            setStatus('🎙 ' + Math.round(avg) + ' dB');
            wasTalking = true;
            clipHadSpeech = true;
            // Cancel silence countdown and tick timer
            if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; silenceCommas = 0; }
            if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
            totalTicks = 0;
        } else {
            document.getElementById('mic-btn').classList.remove('recording');
            if (listening) document.getElementById('mic-btn').classList.add('listening');
            // Start ticking every second of silence
            if (!tickTimer) {
                totalTicks = 0;
                tickTimer = setInterval(() => {
                    totalTicks++;
                    pendingCommas++;
                    setStatus(', '.repeat(totalTicks).trim());
                }, 1000);
            }
            // If we were talking and now silent, start keyword countdown
            if (wasTalking && !silenceTimer) {
                silenceCommas = 0;
                silenceTimer = setTimeout(() => {
                    silenceTimer = null;
                    silenceCommas = totalTicks;
                    wasTalking = false;
                    sparkLog('SILENCE -> checking clip for keyword');
                    checkClipForKeyword();
                }, SILENCE_SECONDS * 1000);
            }
        }
    }, 100);
}

function stopVolumeMonitor() {
    if (volumeInterval) { clearInterval(volumeInterval); volumeInterval = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    analyser = null;
}

// --- Keyword scanner (triggered by silence, not a timer) ---
function startKeywordScanner() {
    startNewClip();  // start first clip immediately
    wasTalking = false;
    silenceTimer = null;
    transcriptParts = [];
    pendingCommas = 0;
    sparkLog('KEYWORD_SCANNER_START: silence-triggered');
}

function stopKeywordScanner() {
    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
    wasTalking = false;
    silenceCommas = 0;
    totalTicks = 0;
    transcriptParts = [];
    pendingCommas = 0;
}

// --- Score how well two strings match (0-1, higher = better) ---
function score(a, b) {
    if (a === b) return 1;
    if (a.includes(b) || b.includes(a)) return 0.9;
    let m = 0;
    for (let i = 0; i < Math.min(a.length, b.length); i++) { if (a[i] === b[i]) m++; }
    return m / Math.max(a.length, b.length);
}

// --- All command targets ---
function getCommandTargets() {
    return [
        // Keys
        {names: ['enter', 'nter', 'inter', 'entr'], act: () => sendKey('Enter'), label: 'enter'},
        {names: ['tab', 'tabs', 'tap'], act: () => sendKey('Tab'), label: 'tab'},
        {names: ['shift tab', 'ship tab', 'shift tap'], act: () => sendKey('BTab'), label: 'shift tab'},
        {names: ['escape', 'scape', 'escap', 'scap'], act: () => sendKey('Escape'), label: 'escape'},
        {names: ['control c', 'ctrl c', 'control see'], act: () => sendKey('C-c'), label: 'ctrl-c'},
        {names: ['control z', 'ctrl z', 'control zee'], act: () => sendKey('C-z'), label: 'ctrl-z'},
        {names: ['control v', 'ctrl v', 'control vee'], act: () => sendKey('C-v'), label: 'ctrl-v'},
        {names: ['control d', 'ctrl d', 'control dee'], act: () => sendKey('C-d'), label: 'ctrl-d'},
        {names: ['up', 'app', 'uhp'], act: () => sendKey('Up'), label: 'up'},
        {names: ['down', 'don', 'doun'], act: () => sendKey('Down'), label: 'down'},
        {names: ['left', 'lef', 'lift'], act: () => sendKey('Left'), label: 'left'},
        {names: ['right', 'rite', 'write'], act: () => sendKey('Right'), label: 'right'},
        {names: ['yes', 'yep', 'yeah', 'yess'], act: () => sendKey('y Enter'), label: 'yes'},
        {names: ['no', 'nope', 'nah'], act: () => sendKey('n Enter'), label: 'no'},
        {names: ['one', 'won', 'wan'], act: () => sendKey('1 Enter'), label: '1'},
        {names: ['two', 'too', 'tu'], act: () => sendKey('2 Enter'), label: '2'},
        {names: ['three', 'tree', 'free'], act: () => sendKey('3 Enter'), label: '3'},
        // Navigation
        {names: ['main menu', 'main many', 'menu', 'lobby', 'go back', 'go home', 'home'], act: () => { window.location.href = '/'; }, label: 'main menu'},
        {names: ['clear', 'clair', 'kleer', 'klear'], act: () => {
            if (mainRecorder && mainRecorder.state === 'recording') try { mainRecorder.stop(); } catch(e) {}
            mainChunks = [];
            if (listening) startMainRecorder();
            setStatus('Recording cleared.');
        }, label: 'clear'},
        // Sessions
        ..._sessions.map(s => ({
            names: [s.name.toLowerCase(), s.id],
            act: () => {
                fetch('/api/session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: s.id}),
                }).then(() => { window.location.href = '/chat'; });
            },
            label: 'session: ' + s.name,
        })),
    ];
}

// --- Check the short clip for "now" keyword ---
async function checkClipForKeyword() {
    if (processing) return;
    processing = true;

    // Only process if there was actual speech in this clip
    if (!clipHadSpeech) {
        sparkLog('CLIP: no speech detected, skipping');
        processing = false;
        if (listening) startNewClip();
        return;
    }

    // Stop current clip to collect audio
    if (clipRecorder && clipRecorder.state === 'recording') {
        await new Promise(resolve => {
            clipRecorder.onstop = resolve;
            clipRecorder.stop();
        });
    }

    if (clipChunks.length === 0 && !prevClipBlob) {
        sparkLog('CLIP: no chunks');
        processing = false;
        if (listening) startNewClip();
        return;
    }

    // Use current clip (it's a proper standalone recording)
    const mimeType = clipRecorder ? clipRecorder.mimeType : 'audio/webm';
    const ext = mimeType.includes('webm') ? 'webm' : 'm4a';
    const blob = new Blob(clipChunks, {type: mimeType});
    sparkLog('CLIP: sending ' + blob.size + ' bytes');

    const formData = new FormData();
    formData.append('audio', blob, `clip.${ext}`);

    try {
        const res = await fetch('/api/transcribe', {method: 'POST', body: formData});
        const data = await res.json();
        if (data.text) {
            const heard = data.text.trim().toLowerCase();
            // Prepend any accumulated silence commas before this speech
            const commaPrefix = pendingCommas > 0 ? ', '.repeat(pendingCommas) : '';
            pendingCommas = 0;
            transcriptParts.push(commaPrefix + heard);
            sparkLog('CLIP_HEARD: ' + transcriptParts.join(' '));

            // Strip phantom "thank you" Groq adds from background noise
            const cleaned = heard.replace(/[^a-z ]/g, '').trim().replace(/\s*thank you\s*$/g, '').trim();
            const words = cleaned.split(/\s+/);
            const lastThree = words.slice(-3);
            let nowIdx = lastThree.lastIndexOf('now');
            // Treat "no" as "now" if there are 4+ words (not a short "no" command)
            if (nowIdx === -1 && words.length >= 4) {
                nowIdx = lastThree.lastIndexOf('no');
            }

            if (nowIdx !== -1) {
                // Strip "now" and anything after it
                const cutAt = words.length - (lastThree.length - nowIdx);
                const before = words.slice(0, cutAt).join(' ').trim();
                sparkLog('NOW prefix: "' + before + '"');

                // Only try command matching on short phrases (1-3 words)
                if (before && words.length <= 4) {
                    const targets = getCommandTargets();
                    let bestScore = 0, bestTarget = null;
                    for (const t of targets) {
                        for (const n of t.names) {
                            const s = score(before, n);
                            if (s > bestScore) { bestScore = s; bestTarget = t; }
                        }
                    }

                    if (bestTarget && bestScore >= 0.5) {
                        // Short command: "enter now", "tab now", etc.
                        sparkLog('CMD_MATCH: "' + before + '" -> ' + bestTarget.label + ' (score=' + bestScore.toFixed(2) + ')');
                        setStatus(bestTarget.label);
                        bestTarget.act();
                        transcriptParts = [];
                        pendingCommas = 0;
                        processing = false;
                        if (listening) startNewClip();
                        return;
                    }
                }

                // Long text or no command match — full transcription
                sparkLog('CLIP_MATCH: now -> full transcribe');
                setStatus('NOW! Transcribing full recording...');
                await sendFullRecording();
                transcriptParts = [];
                pendingCommas = 0;
            }
            // No "now" found — just keep listening, no action
        }
    } catch (e) {
        sparkLog('CLIP_ERROR: ' + e.message);
    }

    processing = false;
    // Start fresh clip
    if (listening) startNewClip();
}

// --- Send accumulated transcript (with pauses) to tmux ---
async function sendFullRecording() {
    // Build text from accumulated transcript parts (already has commas for pauses)
    let text = transcriptParts.join(' ').trim();

    // Strip "now" and trailing commas/punctuation from the end
    text = text.replace(/[,.\s]*now[,.\s?]*$/i, '').trim();
    // Clean up any trailing commas
    text = text.replace(/[,\s]+$/, '').trim();

    if (text) {
        setStatus('Sent: ' + text);
        sparkLog('FULL_SEND: ' + text.substring(0, 200));
        sendText(text);
    } else {
        setStatus('Nothing to send after stripping trigger');
    }

    // Start fresh
    mainChunks = [];
    if (mainRecorder && mainRecorder.state === 'recording') {
        try { mainRecorder.stop(); } catch(e) {}
    }
    if (listening) startMainRecorder();
}

async function sendText(text) {
    try {
        const res = await fetch('/api/voice-text', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: text}),
        });
        const data = await res.json();
        if (data.error) setStatus('Error: ' + data.error);
    } catch (e) {
        setStatus('Error: ' + e.message);
    }
}

// --- Retry last ---
async function retryLast() {
    setStatus('Retrying...');
    try {
        const res = await fetch('/api/retry', {method: 'POST'});
        const data = await res.json();
        if (data.ok) setStatus('Retried: ' + data.text);
        else setStatus('Nothing to retry');
    } catch (e) {
        setStatus('Retry failed: ' + e.message);
    }
}

// --- Auto-approve ---
let autoEnabled = false;
let autoInterval = null;

function toggleAuto() {
    autoEnabled = !autoEnabled;
    document.getElementById('auto-btn').classList.toggle('active', autoEnabled);
    if (autoEnabled) {
        pollScreen();
    } else if (autoInterval) {
        clearTimeout(autoInterval);
        autoInterval = null;
    }
}

async function pollScreen() {
    if (!autoEnabled) return;
    try {
        const res = await fetch('/api/screen');
        const data = await res.json();
        if (data.waiting) {
            sendKey('Enter');
            setStatus('Auto: approved prompt');
        }
    } catch (e) {}
    autoInterval = setTimeout(pollScreen, 2000);
}

// --- TTS polling (screen capture, universal) ---
async function pollTranscript() {
    if (!speakEnabled) return;
    if (isSpeaking) {
        setTimeout(pollTranscript, 3000);
        return;
    }
    try {
        const res = await fetch('/api/screen-latest');
        const data = await res.json();
        if (data.text && data.hash !== lastTranscriptHash) {
            lastTranscriptHash = data.hash;
            const ttsRes = await fetch('/api/tts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: data.text}),
            });
            if (ttsRes.ok) {
                const blob = await ttsRes.blob();
                currentAudio = new Audio(URL.createObjectURL(blob));
                isSpeaking = true;

                document.getElementById('stop-btn').style.display = 'flex';
                currentAudio.onended = () => {
                    isSpeaking = false;
                    currentAudio = null;
                    document.getElementById('stop-btn').style.display = 'none';
                    setStatus(listening ? 'Listening... say "now" to submit' : 'Ready');
                };
                currentAudio.play();
                setStatus('Speaking: ' + data.text.substring(0, 80));
            }
        }
    } catch (e) {}
    if (speakEnabled) setTimeout(pollTranscript, 3000);
}


function switchSession(id) {
    fetch('/api/session', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id}),
    }).then(() => {
        // Clean navigate — no "leave site" prompt
        window.onbeforeunload = null;
        window.location.replace('/chat');
    });
}

const SESSION_COLORS = {
    dev: '#00bfff', nimbus: '#39ff14', alpha: '#fbbf24',
    bravo: '#ff4444', charlie: '#bf5fff', delta: '#ff8800',
};

function setThemeColor(id) {
    const c = SESSION_COLORS[id] || '#3b82f6';
    document.documentElement.style.setProperty('--flame', c);
    document.documentElement.style.setProperty('--flame-dim', c + '20');
    document.documentElement.style.setProperty('--flame-mid', c + '40');
}

// --- Tab labels (editable, stored in localStorage) ---
const TAB_IDS = ['dev', 'nimbus', 'alpha', 'bravo', 'charlie', 'delta'];
const TAB_DEFAULTS = {dev: '1', nimbus: '2', alpha: '3', bravo: '4', charlie: '5', delta: '6'};

function getTabLabel(id) {
    return localStorage.getItem('tab-label-' + id) || TAB_DEFAULTS[id] || id;
}

function setTabLabel(id, label) {
    localStorage.setItem('tab-label-' + id, label);
    const el = document.getElementById('tab-' + id);
    if (el) el.textContent = label;
}

function loadTabLabels() {
    TAB_IDS.forEach(id => {
        const el = document.getElementById('tab-' + id);
        if (el) el.textContent = getTabLabel(id);
    });
}

// Long-press to rename a tab
let longPressTimer = null;
TAB_IDS.forEach(id => {
    const el = document.getElementById('tab-' + id);
    if (!el) return;
    el.addEventListener('touchstart', (e) => {
        longPressTimer = setTimeout(() => {
            e.preventDefault();
            const name = prompt('Label for this tab:', getTabLabel(id));
            if (name !== null && name.trim()) setTabLabel(id, name.trim());
        }, 600);
    }, {passive: false});
    el.addEventListener('touchend', () => clearTimeout(longPressTimer));
    el.addEventListener('touchmove', () => clearTimeout(longPressTimer));
    // Desktop: right-click to rename
    el.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const name = prompt('Label for this tab:', getTabLabel(id));
        if (name !== null && name.trim()) setTabLabel(id, name.trim());
    });
});

function highlightActiveSession() {
    const active = '{{ session.id }}';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const el = document.getElementById('tab-' + active);
    if (el) el.classList.add('active');
    setThemeColor(active);
}

// Persist speaker state across page reloads
if (localStorage.getItem('speakEnabled') === 'true') {
    speakEnabled = true;
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('speak-icon').textContent = '🔊';
    });
}

// Release mic when page is hidden (tab switch, alt-tab); re-acquire when visible
document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        if (listening) stopListening();
    } else {
        if (!listening) toggleListening();
    }
});

// Load sessions on startup, auto-start mic
window.addEventListener('load', async () => {
    try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        _sessions = data.sessions;
    } catch(e) {}
    loadTabLabels();
    if (speakEnabled) pollTranscript();
    highlightActiveSession();
    // Auto-start mic on page load
    if (!listening) toggleListening();
});

</script>
